<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKJ Schedule Dashboard · 서울창업허브 관악</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
:root{
  --red:#e60235;--red-l:#fff0f3;--red-m:#ffd6df;--red-d:#b50029;
  --black:#111;--g8:#222;--g7:#444;--g6:#555;--g5:#777;--g4:#999;--g3:#bbb;--g2:#e0e0e0;--g1:#f0f0f0;--g05:#f6f6f6;--g0:#fafafa;
  --white:#fff;--border:#e8e8e8;--border-soft:#f0f0f0;
  --p1:#2b6cb0;--p1-l:#dbeafe;
  --p2:#7c3aed;--p2-l:#ede9fe;
  --p3:#d97706;--p3-l:#fef3c7;
  --p4:#dc2626;--p4-l:#fee2e2;
  --shadow:0 1px 3px rgba(0,0,0,0.04);
  --shadow-h:0 4px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{font-family:'Pretendard',-apple-system,sans-serif;background:var(--g05);color:var(--black);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased;}

/* ===== LAYOUT ===== */
.app{display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.app.locked{display:none;}
.pin-screen{position:fixed;inset:0;background:var(--white);display:none;align-items:center;justify-content:center;z-index:2000;padding:24px;}
.pin-screen.show{display:flex;}
.pin-card{width:min(360px,100%);border:1px solid var(--border);padding:28px;background:var(--white);box-shadow:var(--shadow-h);}
.pin-logo{font-weight:700;font-size:18px;margin-bottom:6px;}
.pin-logo .accent{color:var(--red);}
.pin-title{font-size:13px;color:var(--g5);margin-bottom:20px;}
.pin-form{display:flex;gap:8px;}
.pin-input{flex:1;height:38px;border:1px solid var(--border);padding:0 12px;font-family:inherit;font-size:16px;letter-spacing:0.2em;text-align:center;outline:none;}
.pin-input:focus{border-color:var(--red);}
.pin-error{height:18px;margin-top:10px;font-size:11px;color:var(--red);}
.topbar{height:56px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:20px;flex-shrink:0;}
.topbar-logo{font-weight:700;font-size:15px;letter-spacing:-0.01em;}
.topbar-logo .accent{color:var(--red);}
.topbar-title{font-size:13px;color:var(--g5);}
.topbar-actions{margin-left:auto;display:flex;gap:8px;}
.btn{height:32px;padding:0 14px;border:1px solid var(--border);background:var(--white);font-size:12px;font-family:inherit;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .12s;color:var(--g7);font-weight:500;}
.btn:hover{border-color:var(--g4);color:var(--black);}
.btn-primary{background:var(--red);color:var(--white);border-color:var(--red);}
.btn-primary:hover{background:var(--red-d);border-color:var(--red-d);color:var(--white);}
.btn-sm{height:26px;padding:0 10px;font-size:11px;}
.btn-icon{width:32px;padding:0;justify-content:center;}
.btn-danger{border-color:var(--red);color:var(--red);}
.btn-danger:hover{background:var(--red-l);border-color:var(--red);color:var(--red);}
.event-banner{display:none;padding:9px 24px;background:#fff3cd;color:#856404;border-bottom:1px solid #ffe69c;font-size:12px;font-weight:500;}
.event-banner.show{display:block;}

.main{flex:1;display:flex;overflow:hidden;}
.content{flex:1;overflow-y:auto;padding:24px;}
.sidebar{width:380px;background:var(--white);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}

/* ===== KPI ROW ===== */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.kpi{background:var(--white);border:1px solid var(--border);padding:16px 18px;transition:border-color .12s;}
.kpi:hover{border-color:var(--g3);}
.kpi-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);margin-bottom:8px;font-weight:500;}
.kpi-value{font-size:28px;font-weight:700;line-height:1;letter-spacing:-0.02em;}
.kpi-value .unit{font-size:13px;color:var(--g5);font-weight:500;margin-left:4px;}
.kpi-value.danger{color:var(--red);}
.kpi-sub{font-size:11px;color:var(--g5);margin-top:6px;}
.kpi-bar{height:3px;background:var(--g1);margin-top:10px;overflow:hidden;}
.kpi-bar-fill{height:100%;background:var(--red);transition:width .3s;}

/* ===== SECTION ===== */
.section{background:var(--white);border:1px solid var(--border);margin-bottom:20px;}
.section-head{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.section-title{font-size:13px;font-weight:600;letter-spacing:-0.01em;}
.section-meta{font-size:11px;color:var(--g5);margin-left:auto;}

/* ===== GANTT ===== */
.gantt-wrap{overflow-x:auto;overflow-y:visible;position:relative;}
.gantt-legend{display:flex;gap:14px;padding:10px 20px;border-bottom:1px solid var(--border-soft);flex-wrap:wrap;background:var(--g0);}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--g6);}
.legend-swatch{width:10px;height:10px;border-radius:2px;}
.gantt{min-width:1100px;position:relative;}
.gantt-header{display:flex;border-bottom:1px solid var(--border);background:var(--g0);position:sticky;top:0;z-index:8;}
.gantt-task-col{width:280px;flex-shrink:0;padding:8px 14px;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);font-weight:500;border-right:1px solid var(--border);display:flex;align-items:center;position:sticky;left:0;z-index:10;background:var(--g0);}
.gantt-dates{display:flex;flex:1;}
.gantt-date-cell{flex:1;min-width:24px;text-align:center;padding:6px 0;font-size:10px;color:var(--g5);border-right:1px solid var(--border-soft);}
.gantt-date-cell.weekend,.gantt-date-cell.holiday{background:var(--g1);color:var(--red);}
.gantt-date-cell.month-start{border-left:2px solid var(--g3);font-weight:600;color:var(--black);}
.gantt-date-cell .day{display:block;font-size:9px;color:var(--g4);margin-top:2px;}
.gantt-date-cell.weekend .day,.gantt-date-cell.holiday .day{color:var(--red);}

.gantt-row{display:flex;border-bottom:1px solid var(--border-soft);min-height:34px;position:relative;}
.gantt-row:hover{background:var(--g05);}
.gantt-row.subtask-row{min-height:28px;background:var(--g0);}
.gantt-row.subtask-row:hover{background:var(--g0);}
.gantt-row.phase-row{background:var(--g0);font-weight:600;}
.gantt-row.phase-row:hover{background:var(--g1);}
.gantt-row.phase-row .gantt-task-info{background:var(--g0);}
.gantt-task-info{width:280px;flex-shrink:0;padding:8px 14px;font-size:12px;display:flex;align-items:center;gap:8px;border-right:1px solid var(--border);position:sticky;left:0;z-index:6;background:var(--white);}
.phase-tag{font-size:9px;padding:1px 6px;border-radius:2px;color:var(--white);font-weight:500;letter-spacing:0.05em;flex-shrink:0;}
.phase-tag.p1{background:var(--p1);} .phase-tag.p2{background:var(--p2);} .phase-tag.p3{background:var(--p3);} .phase-tag.p4{background:var(--p4);}
.gantt-task-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
.gantt-task-name:hover{color:var(--red);}
.gantt-toggle{width:16px;border:none;background:none;color:var(--g5);font-size:10px;cursor:pointer;flex-shrink:0;}
.gantt-subtask-text{font-size:11px;color:var(--g6);}
.gantt-subtask-text.done{color:var(--g4);text-decoration:line-through;}
.gantt-task-owners{display:flex;gap:2px;flex-shrink:0;}
.owner-chip{width:18px;height:18px;border-radius:50%;background:var(--g2);color:var(--g7);font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600;cursor:default;}
.gantt-timeline{flex:1;position:relative;display:flex;}
.gantt-day{flex:1;min-width:24px;border-right:1px solid var(--border-soft);}
.gantt-day.weekend,.gantt-day.holiday{background:var(--g1);}
.gantt-day.today{background:rgba(230,2,53,0.06);position:relative;}
.gantt-day.today::after{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--red);}

.gantt-bar{position:absolute;top:6px;bottom:6px;border-radius:3px;display:flex;align-items:center;padding:0 8px;font-size:10px;color:var(--white);font-weight:500;overflow:hidden;cursor:pointer;transition:all .12s;box-shadow:var(--shadow);white-space:nowrap;}
.gantt-bar:hover{transform:translateY(-1px);box-shadow:var(--shadow-h);z-index:3;}
.gantt-bar.selected{outline:2px solid #2563eb;outline-offset:2px;z-index:4;}
.gantt-bar.dragging{transition:none;z-index:5;}
.gantt-handle{position:absolute;top:0;bottom:0;width:8px;background:rgba(255,255,255,0.35);opacity:0;transition:opacity .12s;}
.gantt-bar.selected .gantt-handle,.gantt-bar:hover .gantt-handle{opacity:1;}
.gantt-handle.left{left:0;cursor:ew-resize;}
.gantt-handle.right{right:0;cursor:ew-resize;}
.gantt-bar.phase-bar{top:8px;bottom:8px;opacity:0.85;}
.gantt-bar.completed{opacity:0.5;}
.gantt-bar.completed::before{content:'✓ ';}
.gantt-bar.in-progress{}
.gantt-bar.in-progress::after{content:'';position:absolute;left:0;top:0;bottom:0;background:rgba(255,255,255,0.25);width:var(--progress,0%);}

.gantt-milestone{position:absolute;top:50%;width:9px;height:9px;background:var(--black);transform:translate(-50%,-50%) rotate(45deg);box-shadow:0 0 0 1px var(--white);cursor:pointer;z-index:2;}
.gantt-milestone.critical{background:var(--red);}
.gantt-milestone::after{content:attr(data-label);position:absolute;top:-22px;left:50%;transform:translateX(-50%) rotate(-45deg);font-size:10px;color:var(--g7);white-space:nowrap;font-weight:500;}

/* tooltip */
.tooltip{position:fixed;background:var(--black);color:var(--white);padding:8px 12px;border-radius:4px;font-size:11px;pointer-events:none;z-index:1000;opacity:0;transition:opacity .15s;box-shadow:var(--shadow-h);max-width:240px;line-height:1.5;}
.tooltip.show{opacity:1;}
.tooltip b{color:var(--red-m);}

/* ===== TASK LIST ===== */
.task-table{width:100%;border-collapse:collapse;}
.task-table thead th{text-align:left;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);font-weight:500;padding:10px 14px;background:var(--g0);border-bottom:1px solid var(--border);}
.task-table tbody td{padding:10px 14px;border-bottom:1px solid var(--border-soft);font-size:12px;vertical-align:middle;}
.task-table tbody tr{cursor:pointer;transition:background .1s;}
.task-table tbody tr:hover{background:var(--g0);}
.task-table tbody tr.selected{background:var(--red-l);}
.task-table tbody tr.due-soon{background:#fff8f0;}
.task-table tbody tr.due-soon:hover{background:#fff3e4;}
.task-row-phase{display:inline-flex;align-items:center;gap:6px;}
.task-filterbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:12px 14px;border-bottom:1px solid var(--border-soft);background:var(--g0);}
.filter-select,.filter-search{height:30px;border:1px solid var(--border);background:var(--white);font-family:inherit;font-size:11px;color:var(--g7);padding:0 8px;outline:none;}
.filter-search{min-width:180px;flex:1;}
.filter-check{height:30px;display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--g6);}
.task-add-row{padding:12px 14px;border-top:1px solid var(--border-soft);background:var(--g0);}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500;}
.status-todo{background:var(--g1);color:var(--g6);}
.status-progress{background:var(--p1-l);color:var(--p1);}
.status-done{background:#dcfce7;color:#15803d;}
.progress-mini{display:inline-flex;align-items:center;gap:8px;min-width:80px;}
.progress-mini-bar{flex:1;height:4px;background:var(--g1);border-radius:2px;overflow:hidden;}
.progress-mini-fill{height:100%;background:var(--red);transition:width .3s;}
.progress-mini-text{font-size:10px;color:var(--g5);font-variant-numeric:tabular-nums;min-width:28px;text-align:right;}

/* ===== SIDEBAR ===== */
.tabs{display:flex;border-bottom:1px solid var(--border);}
.tab{flex:1;padding:14px;text-align:center;font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);cursor:pointer;font-weight:500;border-bottom:2px solid transparent;transition:all .12s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit;}
.tab:hover{color:var(--g7);}
.tab.active{color:var(--red);border-bottom-color:var(--red);}
.tab-count{margin-left:4px;font-size:10px;color:var(--g4);}
.tab.active .tab-count{color:var(--red);}
.tab-content{flex:1;overflow-y:auto;padding:18px;}

/* TEAM TAB */
.team-add{width:100%;padding:14px;border:1.5px dashed var(--border);background:var(--white);font-size:12px;color:var(--g5);cursor:pointer;margin-bottom:14px;font-family:inherit;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px;}
.team-add:hover{border-color:var(--red);color:var(--red);background:var(--red-l);}
.member-card{background:var(--white);border:1px solid var(--border);padding:14px 16px;margin-bottom:10px;position:relative;transition:border-color .12s;}
.member-card:hover{border-color:var(--g3);}
.member-card.editing{border-color:var(--red);}
.member-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.member-avatar{width:32px;height:32px;border-radius:50%;background:var(--red-l);color:var(--red);display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;flex-shrink:0;}
.member-name{flex:1;font-size:13px;font-weight:600;border:none;background:none;font-family:inherit;outline:none;padding:2px 4px;border-radius:3px;}
.member-name:hover,.member-name:focus{background:var(--g05);}
.member-role{font-size:11px;color:var(--g6);border:none;background:none;font-family:inherit;outline:none;width:100%;padding:4px;border-radius:3px;resize:none;}
.member-role:hover,.member-role:focus{background:var(--g05);}
.member-stat{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--g5);margin-top:8px;padding-top:8px;border-top:1px solid var(--border-soft);}
.member-stat b{color:var(--red);font-size:13px;font-weight:700;}
.member-remove{position:absolute;top:8px;right:8px;width:20px;height:20px;border:none;background:none;color:var(--g4);cursor:pointer;font-size:14px;opacity:0;transition:opacity .12s;}
.member-card:hover .member-remove{opacity:1;}
.member-remove:hover{color:var(--red);}

/* TASK DETAIL TAB */
.task-empty{padding:40px 20px;text-align:center;color:var(--g4);font-size:12px;}
.detail-field{margin-bottom:18px;}
.detail-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);font-weight:500;margin-bottom:6px;}
.detail-value{font-size:13px;color:var(--black);}
.detail-input,.detail-textarea{width:100%;padding:8px 10px;border:1px solid var(--border);font-family:inherit;font-size:12px;color:var(--black);outline:none;transition:border-color .12s;}
.detail-input:focus,.detail-textarea:focus{border-color:var(--red);}
.detail-textarea{resize:vertical;min-height:60px;}
.detail-row{display:flex;gap:10px;}
.detail-row > *{flex:1;}
.owner-select{display:flex;flex-wrap:wrap;gap:6px;}
.owner-toggle{padding:5px 10px;border:1px solid var(--border);background:var(--white);font-size:11px;font-family:inherit;cursor:pointer;border-radius:14px;display:flex;align-items:center;gap:5px;transition:all .12s;}
.owner-toggle:hover{border-color:var(--g4);}
.owner-toggle.active{background:var(--red);color:var(--white);border-color:var(--red);}
.status-select{display:flex;gap:6px;}
.status-btn{flex:1;padding:7px;font-size:11px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-family:inherit;font-weight:500;transition:all .12s;}
.status-btn:hover{border-color:var(--g3);}
.status-btn.active.todo{background:var(--g1);border-color:var(--g3);color:var(--g7);}
.status-btn.active.progress{background:var(--p1-l);border-color:var(--p1);color:var(--p1);}
.status-btn.active.done{background:#dcfce7;border-color:#15803d;color:#15803d;}
.progress-input{display:flex;align-items:center;gap:10px;}
.progress-input input[type=range]{flex:1;}
.progress-input input[disabled]{opacity:.55;}
.progress-input input[type=number]{width:60px;padding:6px 8px;border:1px solid var(--border);font-family:inherit;font-size:12px;text-align:center;}
.period-list,.subtask-list{display:flex;flex-direction:column;gap:6px;}
.period-item,.subtask-edit-item{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid var(--border-soft);}
.period-item input[type=date]{min-width:0;}
.subtask-edit-item.done .subtask-input{color:var(--g4);text-decoration:line-through;}
.subtask-input{flex:1;border:none;background:transparent;font-family:inherit;font-size:12px;outline:none;padding:4px;}
.subtask-input:focus{background:var(--g05);}
.subtask-remove,.period-remove{width:22px;height:22px;border:none;background:none;color:var(--g4);cursor:pointer;font-size:14px;opacity:0;transition:opacity .12s;}
.subtask-edit-item:hover .subtask-remove,.period-item:hover .period-remove{opacity:1;}
.subtask-add{display:flex;gap:6px;margin-top:8px;}
.subtask-add input{flex:1;padding:7px 10px;border:1px solid var(--border);font-family:inherit;font-size:12px;outline:none;}
.subtask-count{margin-left:6px;font-size:11px;color:var(--red);font-variant-numeric:tabular-nums;}

/* CHECKLIST */
.check-section{margin-bottom:22px;}
.check-section-title{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--g5);font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.check-progress{font-size:11px;color:var(--red);font-variant-numeric:tabular-nums;}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:9px 0;cursor:pointer;border-bottom:1px solid var(--border-soft);}
.check-item:last-child{border-bottom:none;}
.check-box{width:18px;height:18px;border:1.5px solid var(--g3);border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .12s;}
.check-item.checked .check-box{background:var(--red);border-color:var(--red);}
.check-item.checked .check-box::after{content:'✓';color:var(--white);font-size:12px;font-weight:bold;}
.check-text{font-size:12px;color:var(--g7);line-height:1.5;}
.check-item.checked .check-text{color:var(--g4);text-decoration:line-through;}
.check-add{display:flex;gap:6px;margin-top:10px;}
.check-add input{flex:1;padding:7px 10px;border:1px solid var(--border);font-family:inherit;font-size:12px;outline:none;}
.check-add input:focus{border-color:var(--red);}

/* SCROLL */
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g2);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:var(--g3);}

/* PRINT */
@media print{
  .topbar-actions,.sidebar{display:none;}
  .content{overflow:visible;}
  .gantt-wrap{overflow:visible;}
}
</style>
</head>
<body>
<div class="pin-screen" id="pin-screen">
  <div class="pin-card">
    <div class="pin-logo"><span class="accent">AKJ</span> Schedule</div>
    <div class="pin-title">서울창업허브 관악 설계공모</div>
    <div class="pin-form">
      <input class="pin-input" id="pin-input" type="password" inputmode="numeric" maxlength="4" placeholder="PIN" onkeypress="if(event.key==='Enter') verifyPin()">
      <button class="btn btn-primary" onclick="verifyPin()">확인</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>

<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-logo"><span class="accent">AKJ</span> Schedule</div>
  <div class="topbar-title">서울창업허브 관악 설계공모 · 2026.05.01 – 2026.08.14</div>
  <div class="topbar-actions">
    <button class="btn btn-sm" onclick="exportJSON()">📥 백업</button>
    <button class="btn btn-sm" onclick="importJSON()">📤 복원</button>
    <button class="btn btn-sm" onclick="window.print()">🖨️ 인쇄</button>
    <button class="btn btn-sm" onclick="lockDashboard()">🔒 잠금</button>
    <button class="btn btn-sm btn-icon" onclick="resetAll()" title="초기화">↻</button>
  </div>
</header>
<div class="event-banner" id="event-banner"></div>

<div class="main">

<!-- CONTENT -->
<div class="content">

// ============ STATE ============
let state = loadState();
let selectedPeriod = null;
let dragState = null;
let focusTaskNameOnRender = false;

function defaultState() {
  return {
    tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
    members: JSON.parse(JSON.stringify(DEFAULT_MEMBERS)),
    checklist: JSON.parse(JSON.stringify(DEFAULT_CHECKLIST)),
    selectedTaskId: null,
    activeTab: 'team',
    expandedTasks: {},
    filters: {phase:'all', status:'all', owner:'all', unassigned:false, dueSoon:false, query:''},
  };
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return migrateState(JSON.parse(saved));
  } catch(e) { console.error('load failed', e); }
  return migrateState(defaultState());
}

function migrateState(data) {
  const base = defaultState();
  const next = Object.assign(base, data || {});
  next.tasks = (next.tasks && next.tasks.length ? next.tasks : DEFAULT_TASKS).map((task, taskIdx) => {
    const migrated = Object.assign({}, task);
    if (!Array.isArray(migrated.periods) || migrated.periods.length === 0) {
      migrated.periods = [{id:`${migrated.id || 't'+taskIdx}-p1`, start:migrated.start || todayStr(), end:migrated.end || addDays(todayStr(), 3)}];
    }
    migrated.periods = migrated.periods.map((p, idx) => ({
      id:p.id || `${migrated.id}-p${idx+1}`,
      start:p.start || todayStr(),
      end:p.end || p.start || todayStr(),
    }));
    if (!Array.isArray(migrated.subtasks)) migrated.subtasks = [];
    if (typeof migrated.manualProgress !== 'number') migrated.manualProgress = Number(migrated.progress || 0);
    delete migrated.start;
    delete migrated.end;
    delete migrated.progress;
    migrated.owners = migrated.owners || [];
    migrated.status = migrated.status || 'todo';
    migrated.memo = migrated.memo || '';
    return migrated;
  });
  next.members = next.members || [];
  next.checklist = next.checklist || JSON.parse(JSON.stringify(DEFAULT_CHECKLIST));
  next.expandedTasks = next.expandedTasks || {};
  next.filters = Object.assign({phase:'all', status:'all', owner:'all', unassigned:false, dueSoon:false, query:''}, next.filters || {});
  if (next.selectedTaskId && !next.tasks.some(t => t.id === next.selectedTaskId)) next.selectedTaskId = null;
  return next;
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
  catch(e) { console.error('save failed', e); }
}

// ============ UTIL ============
function parseDate(s) { return new Date(s + 'T00:00:00'); }
function dateToStr(d) {
  const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${dd}`;
}
function daysBetween(a, b) { return Math.round((parseDate(b) - parseDate(a)) / 86400000); }
function addDays(s, n) { const d = parseDate(s); d.setDate(d.getDate()+n); return dateToStr(d); }
function isWeekend(s) { const d = parseDate(s).getDay(); return d===0 || d===6; }
function isHoliday(s) { return !!HOLIDAYS_2026[s]; }
function dayName(s) { return ['일','월','화','수','목','금','토'][parseDate(s).getDay()]; }
function todayStr() { return dateToStr(new Date()); }
function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function initials(name) {
  if (!name) return '?';
  const trimmed = name.trim();
  if (/[가-힣]/.test(trimmed)) return trimmed.charAt(0);
  const parts = trimmed.split(/\s+/);
  return parts.length >= 2 ? (parts[0][0] + parts[parts.length-1][0]).toUpperCase() : trimmed.substring(0, 2).toUpperCase();
}
function taskProgress(t) {
  if (t.subtasks && t.subtasks.length) {
    return Math.round((t.subtasks.filter(s => s.done).length / t.subtasks.length) * 100);
  }
  return Math.max(0, Math.min(100, Number(t.manualProgress || 0)));
}
function phaseProgress(phase) {
  const tasks = state.tasks.filter(t => Number(t.phase) === Number(phase));
  return tasks.length ? Math.round(tasks.reduce((sum, t) => sum + taskProgress(t), 0) / tasks.length) : 0;
}
function taskPeriodBounds(t) {
  const periods = t.periods || [];
  if (!periods.length) return {start:todayStr(), end:todayStr()};
  return {
    start:periods.map(p => p.start).sort()[0],
    end:periods.map(p => p.end).sort().slice(-1)[0],
  };
}
function isDueSoon(t) {
  const today = todayStr();
  const futureEnds = (t.periods || []).map(p => p.end).filter(end => daysBetween(today, end) >= 0).sort();
  if (!futureEnds.length) return false;
  const diff = daysBetween(today, futureEnds[0]);
  return diff >= 0 && diff <= 3;
}
function filteredTasks() {
  const f = state.filters;
  const query = (f.query || '').trim().toLowerCase();
  return state.tasks.filter(t => {
    if (f.phase !== 'all' && String(t.phase) !== f.phase) return false;
    if (f.status !== 'all' && t.status !== f.status) return false;
    if (f.owner !== 'all' && !(t.owners || []).includes(f.owner)) return false;
    if (f.unassigned && (t.owners || []).length) return false;
    if (f.dueSoon && !isDueSoon(t)) return false;
    if (query && !t.name.toLowerCase().includes(query)) return false;
    return true;
  });
}
function hasActiveFilters() {
  const f = state.filters;
  return f.phase !== 'all' || f.status !== 'all' || f.owner !== 'all' || f.unassigned || f.dueSoon || !!(f.query || '').trim();
}

function renderKPI() {
  const sub = new Date(SUBMIT_DATE+'T17:00:00');
  const dday = Math.ceil((sub - new Date()) / 86400000);
  document.getElementById('kpi-dday').textContent = dday >= 0 ? dday : 'D+' + Math.abs(dday);

  const totalProgress = state.tasks.length
    ? Math.round(state.tasks.reduce((sum, t) => sum + taskProgress(t), 0) / state.tasks.length)
    : 0;
  document.getElementById('kpi-progress').textContent = totalProgress;
  document.getElementById('kpi-progress-bar').style.width = totalProgress + '%';

  [1,2,3,4].forEach(n => {
    const pct = phaseProgress(n);
    document.getElementById(`kpi-p${n}`).textContent = pct + '%';
  });
  document.getElementById('kpi-p12-bar').style.width = Math.round((phaseProgress(1) + phaseProgress(2)) / 2) + '%';
  document.getElementById('kpi-p34-bar').style.width = Math.round((phaseProgress(3) + phaseProgress(4)) / 2) + '%';
}

// ============ GANTT ============
function renderGantt() {
  const wrap = document.getElementById('gantt-wrap');
  const days = daysBetween(PROJECT_START, PROJECT_END) + 1;
  const today = todayStr();

  let dateCells = '';
  for (let i = 0; i < days; i++) {
    const d = addDays(PROJECT_START, i);
    const dt = parseDate(d);
    const classes = [];
    if (isWeekend(d)) classes.push('weekend');
    if (isHoliday(d)) classes.push('holiday');
    if (dt.getDate() === 1) classes.push('month-start');
    const display = dt.getDate() === 1 || i === 0 ? `${dt.getMonth()+1}/${dt.getDate()}` : `${dt.getDate()}`;
    dateCells += `<div class="gantt-date-cell ${classes.join(' ')}">${display}<span class="day">${dayName(d)}</span></div>`;
  }

  let phaseRows = '';
  Object.entries(PHASES).forEach(([num, phase]) => {
    const startOffset = daysBetween(PROJECT_START, phase.start);
    const duration = daysBetween(phase.start, phase.end) + 1;
    phaseRows += `
      <div class="gantt-row phase-row" data-phase="${num}">
        <div class="gantt-task-info">
          <span class="phase-tag p${num}">P${num}</span>
          <span class="gantt-task-name" style="font-weight:600">${phase.name}</span>
        </div>
        <div class="gantt-timeline">
          ${buildDayCells(days, today)}
          <div class="gantt-bar phase-bar" style="left:${(startOffset / days) * 100}%;width:${(duration / days) * 100}%;background:${phase.color}">${phase.name}</div>
        </div>
      </div>`;
  });

  let taskRows = '';
  state.tasks.forEach(task => {
    const phaseColor = `var(--p${task.phase})`;
    const ownersHtml = (task.owners||[]).slice(0,3).map(oid => {
      const m = state.members.find(x => x.id===oid);
      return m ? `<div class="owner-chip" title="${escapeHtml(m.name)}">${initials(m.name)}</div>` : '';
    }).join('');
    const moreOwners = (task.owners||[]).length > 3 ? `<div class="owner-chip">+${task.owners.length-3}</div>` : '';
    const statusClass = task.status==='done' ? 'completed' : (task.status==='progress' ? 'in-progress' : '');
    const barLabel = task.name.length > 20 ? task.name.substring(0,18)+'…' : task.name;
    const prog = taskProgress(task);
    const expanded = !!state.expandedTasks[task.id];
    const bars = (task.periods || []).map(period => {
      const startOffset = daysBetween(PROJECT_START, period.start);
      const duration = daysBetween(period.start, period.end) + 1;
      const isSelected = selectedPeriod && selectedPeriod.taskId === task.id && selectedPeriod.periodId === period.id;
      return `<div class="gantt-bar ${statusClass} ${isSelected?'selected':''}" 
          data-task-id="${task.id}" data-period-id="${period.id}"
          style="left:${(startOffset / days) * 100}%;width:${(duration / days) * 100}%;background:${phaseColor};--progress:${prog}%"
          onclick="selectPeriod(event, '${task.id}', '${period.id}')"
          onmousedown="startPeriodDrag(event, '${task.id}', '${period.id}', 'move')"
          onmouseenter="showTooltip(event, '${task.id}', '${period.id}')"
          onmouseleave="hideTooltip()">
          <span class="gantt-handle left" onmousedown="startPeriodDrag(event, '${task.id}', '${period.id}', 'start')"></span>
          ${escapeHtml(barLabel)}
          <span class="gantt-handle right" onmousedown="startPeriodDrag(event, '${task.id}', '${period.id}', 'end')"></span>
        </div>`;
    }).join('');

    taskRows += `
      <div class="gantt-row" data-task-id="${task.id}">
        <div class="gantt-task-info">
          <button class="gantt-toggle" onclick="toggleTaskExpanded(event, '${task.id}')">${expanded?'▼':'▶'}</button>
          <span class="phase-tag p${task.phase}">P${task.phase}</span>
          <span class="gantt-task-name" onclick="selectTask('${task.id}')">${escapeHtml(task.name)}</span>
          <div class="gantt-task-owners">${ownersHtml}${moreOwners}</div>
        </div>
        <div class="gantt-timeline">
          ${buildDayCells(days, today)}
          ${bars}
        </div>
      </div>
      ${expanded ? renderGanttSubtaskRows(task, days, today) : ''}`;
  });

  let milestonesHtml = '';
  MILESTONES.forEach(m => {
    const offset = daysBetween(PROJECT_START, m.date);
    milestonesHtml += `<div class="gantt-milestone ${m.critical?'critical':''}" 
      style="left:${(offset / days) * 100 + (50 / days)}%" 
      data-label="${escapeHtml(m.label)}"
      onmouseenter="showMilestoneTooltip(event, '${escapeHtml(m.label)}', '${m.date}')"
      onmouseleave="hideTooltip()"></div>`;
  });
  const milestonesRow = `
    <div class="gantt-row" style="min-height:42px;background:var(--g0);border-bottom:1px solid var(--border)">
      <div class="gantt-task-info"><span style="font-size:11px;color:var(--g6);font-weight:600">📍 마일스톤</span></div>
      <div class="gantt-timeline" style="position:relative">${buildDayCells(days, today)}${milestonesHtml}</div>
    </div>`;

  wrap.innerHTML = `
    <div class="gantt">
      <div class="gantt-header">
        <div class="gantt-task-col">작업 / 단계</div>
        <div class="gantt-dates">${dateCells}</div>
      </div>
      ${milestonesRow}
      ${phaseRows}
      ${taskRows}
    </div>`;
}

function renderGanttSubtaskRows(task, days, today) {
  const items = task.subtasks && task.subtasks.length ? task.subtasks : [{id:'empty', text:'서브태스크 없음', done:false}];
  return items.map(st => `
    <div class="gantt-row subtask-row">
      <div class="gantt-task-info" style="padding-left:42px">
        ${st.id === 'empty' ? '' : `<input type="checkbox" ${st.done?'checked':''} onclick="toggleSubtask('${task.id}', '${st.id}')">`}
        <span class="gantt-subtask-text ${st.done?'done':''}">${escapeHtml(st.text)}</span>
      </div>
      <div class="gantt-timeline">${buildDayCells(days, today)}</div>
    </div>`).join('');
}

function buildDayCells(days, today) {
  let html = '';
  for (let i = 0; i < days; i++) {
    const d = addDays(PROJECT_START, i);
    const classes = [];
    if (isWeekend(d)) classes.push('weekend');
    if (isHoliday(d)) classes.push('holiday');
    if (d === today) classes.push('today');
    html += `<div class="gantt-day ${classes.join(' ')}"></div>`;
  }
  return html;
}

function toggleTaskExpanded(event, taskId) {
  event.stopPropagation();
  state.expandedTasks[taskId] = !state.expandedTasks[taskId];
  saveState();
  renderGantt();
}

function selectPeriod(event, taskId, periodId) {
  event.stopPropagation();
  selectedPeriod = {taskId, periodId};
  selectTask(taskId);
  renderGantt();
}

function startPeriodDrag(event, taskId, periodId, mode) {
  event.stopPropagation();
  const task = state.tasks.find(t => t.id === taskId);
  const period = task && task.periods.find(p => p.id === periodId);
  if (!task || !period) return;
  const isSelected = selectedPeriod && selectedPeriod.taskId === taskId && selectedPeriod.periodId === periodId;
  if (!isSelected) return;
  const timeline = event.currentTarget.closest('.gantt-timeline');
  dragState = {
    taskId, periodId, mode,
    startX:event.clientX,
    originalStart:period.start,
    originalEnd:period.end,
    dayWidth:timeline.getBoundingClientRect().width / (daysBetween(PROJECT_START, PROJECT_END) + 1),
  };
  event.currentTarget.closest('.gantt-bar').classList.add('dragging');
  document.addEventListener('mousemove', onPeriodDrag);
  document.addEventListener('mouseup', endPeriodDrag);
}

function onPeriodDrag(event) {
  if (!dragState) return;
  const task = state.tasks.find(t => t.id === dragState.taskId);
  const period = task && task.periods.find(p => p.id === dragState.periodId);
  if (!period) return;
  const deltaDays = Math.round((event.clientX - dragState.startX) / dragState.dayWidth);
  if (dragState.mode === 'move') {
    period.start = addDays(dragState.originalStart, deltaDays);
    period.end = addDays(dragState.originalEnd, deltaDays);
  } else if (dragState.mode === 'start') {
    const nextStart = addDays(dragState.originalStart, deltaDays);
    if (daysBetween(nextStart, period.end) >= 0) period.start = nextStart;
  } else {
    const nextEnd = addDays(dragState.originalEnd, deltaDays);
    if (daysBetween(period.start, nextEnd) >= 0) period.end = nextEnd;
  }
  showDragTooltip(event, period.start, period.end);
  renderGantt();
}

function endPeriodDrag() {
  if (!dragState) return;
  dragState = null;
  document.removeEventListener('mousemove', onPeriodDrag);
  document.removeEventListener('mouseup', endPeriodDrag);
  hideTooltip();
  saveState();
  renderAll();
}

// ============ TOOLTIP ============
function showTooltip(e, taskId, periodId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  const period = (t.periods || []).find(p => p.id === periodId) || taskPeriodBounds(t);
  const tip = document.getElementById('tooltip');
  const owners = (t.owners||[]).map(oid => {
    const m = state.members.find(x => x.id===oid); return m ? m.name : null;
  }).filter(Boolean).join(', ') || '<i style="color:#aaa">미배정</i>';
  const statusText = {todo:'대기', progress:'진행 중', done:'완료'}[t.status];
  tip.innerHTML = `<b>${escapeHtml(t.name)}</b><br>${period.start} → ${period.end}<br>상태: ${statusText} · 진행률 ${taskProgress(t)}%<br>담당: ${owners}<br>${t.memo ? '<i style="color:#bbb">'+escapeHtml(t.memo)+'</i>' : ''}`;
  positionTooltip(e);
  tip.classList.add('show');
}
function showDragTooltip(e, start, end) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<b>기간 조정</b><br>${start} → ${end}`;
  positionTooltip(e);
  tip.classList.add('show');
}
function showMilestoneTooltip(e, label, date) {
  const tip = document.getElementById('tooltip');
  tip.innerHTML = `<b>${label}</b><br>${date}`;
  positionTooltip(e);
  tip.classList.add('show');
}
function positionTooltip(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (e.clientX + 12) + 'px';
  tip.style.top = (e.clientY + 12) + 'px';
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('show'); }
document.addEventListener('mousemove', e => {
  const tip = document.getElementById('tooltip');
  if (tip.classList.contains('show') && !dragState) positionTooltip(e);
});
document.addEventListener('click', e => {
  if (!isAuthed() || !selectedPeriod) return;
  if (!e.target.closest('.gantt-bar')) {
    selectedPeriod = null;
    renderGantt();
  }
});

      <button class="member-remove" onclick="removeMember('${m.id}')" title="삭제">×</button>
      <div class="member-head">
        <div class="member-avatar">${initials(m.name)}</div>
        <input class="member-name" value="${escapeHtml(m.name)}" placeholder="이름" onchange="updateMember('${m.id}', 'name', this.value)">
      </div>
      <textarea class="member-role" rows="2" placeholder="역할 · 담당 분야 (예: 매스/입면 · 패널 디자인 · 도면 컬러링)" onchange="updateMember('${m.id}', 'role', this.value)">${escapeHtml(m.role||'')}</textarea>
      <div class="member-stat"><span>배정된 작업</span><span><b>${taskCount}</b>건</span></div>
    </div>`;
  }).join('');
}

function addMember() {
  const id = 'm' + Date.now();
  state.members.push({id, name:'신규 팀원', role:''});
  saveState();
  renderAll();
  setTimeout(() => {
    const newCard = document.querySelector(`[data-member-id="${id}"] .member-name`);
    if (newCard) { newCard.focus(); newCard.select(); }
  }, 50);
}

function updateMember(id, field, value) {
  const m = state.members.find(x => x.id===id);
  if (m) {
    m[field] = value;
    saveState();
    renderAll();
  }
}

function removeMember(id) {
  const m = state.members.find(x => x.id===id);
  if (!m) return;
  if (!confirm(`'${m.name}' 팀원을 삭제할까요?\n배정된 작업에서도 제외됩니다.`)) return;
  state.members = state.members.filter(x => x.id !== id);
  state.tasks.forEach(t => { t.owners = (t.owners||[]).filter(oid => oid !== id); });
  saveState();
  renderAll();
}

// ============ TASK DETAIL ============
function selectTask(id) {
  state.selectedTaskId = id;
  state.activeTab = 'task';
  saveState();
  renderAll();
}

function renderTaskDetail() {
  const container = document.getElementById('task-detail');
  const t = state.tasks.find(x => x.id === state.selectedTaskId);

  if (!t) {
    container.innerHTML = `<div class="task-empty">
      ← 왼쪽 작업 목록이나 간트 막대를 클릭하면<br>여기에 상세 정보가 표시돼요.
    </div>`;
    return;
  }

  const phaseInfo = PHASES[t.phase];
  const prog = taskProgress(t);
  const hasSubtasks = !!(t.subtasks && t.subtasks.length);
  const doneCount = (t.subtasks || []).filter(s => s.done).length;
  const periodItems = (t.periods || []).map(p => `
    <div class="period-item">
      <input class="detail-input" type="date" value="${p.start}" onchange="updatePeriod('${t.id}', '${p.id}', 'start', this.value)">
      <input class="detail-input" type="date" value="${p.end}" onchange="updatePeriod('${t.id}', '${p.id}', 'end', this.value)">
      <button class="period-remove" title="삭제" onclick="removePeriod('${t.id}', '${p.id}')">×</button>
    </div>`).join('');
  const subtaskItems = (t.subtasks || []).map(st => `
    <div class="subtask-edit-item ${st.done?'done':''}">
      <input type="checkbox" ${st.done?'checked':''} onchange="toggleSubtask('${t.id}', '${st.id}')">
      <input class="subtask-input" value="${escapeHtml(st.text)}" onchange="updateSubtask('${t.id}', '${st.id}', this.value)">
      <button class="subtask-remove" title="삭제" onclick="removeSubtask('${t.id}', '${st.id}')">×</button>
    </div>`).join('');
  container.innerHTML = `
    <div class="detail-field">
      <div class="detail-label">단계</div>
      <div class="detail-value">
        <span class="phase-tag p${t.phase}">P${t.phase}</span>
        <span style="margin-left:6px">${phaseInfo.name}</span>
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">작업명</div>
      <input class="detail-input" id="task-name-input" value="${escapeHtml(t.name)}" 
             onchange="updateTask('${t.id}', 'name', this.value)">
    </div>

    <div class="detail-field">
      <div class="detail-label">기간</div>
      <div class="period-list">${periodItems}</div>
      <button class="btn btn-sm" style="margin-top:8px" onclick="addPeriod('${t.id}')">+ 기간 추가</button>
    </div>

    <div class="detail-field">
      <div class="detail-label">담당자 (복수 선택)</div>
      <div class="owner-select">
        ${state.members.length === 0 
          ? '<span style="font-size:11px;color:var(--g4)">팀 탭에서 팀원을 먼저 추가하세요</span>'
          : state.members.map(m => {
            const on = (t.owners||[]).includes(m.id);
            return `<button class="owner-toggle ${on?'active':''}" 
                          onclick="toggleOwner('${t.id}', '${m.id}')">
              <span style="width:14px;height:14px;border-radius:50%;background:${on?'rgba(255,255,255,0.25)':'var(--red-l)'};color:${on?'#fff':'var(--red)'};display:inline-flex;align-items:center;justify-content:center;font-size:8px;font-weight:600">${initials(m.name)}</span>
              ${escapeHtml(m.name)}
            </button>`;
          }).join('')}
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">상태</div>
      <div class="status-select">
        <button class="status-btn todo ${t.status==='todo'?'active':''}" onclick="updateTask('${t.id}', 'status', 'todo')">대기</button>
        <button class="status-btn progress ${t.status==='progress'?'active':''}" onclick="updateTask('${t.id}', 'status', 'progress')">진행 중</button>
        <button class="status-btn done ${t.status==='done'?'active':''}" onclick="updateTask('${t.id}', 'status', 'done')">완료</button>
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">진행률 ${prog}%</div>
      <div class="progress-input">
        <input type="range" min="0" max="100" step="5" value="${prog}" ${hasSubtasks?'disabled':''}
               oninput="updateTask('${t.id}', 'manualProgress', parseInt(this.value))">
        <input type="number" min="0" max="100" value="${prog}" ${hasSubtasks?'disabled':''}
               onchange="updateTask('${t.id}', 'manualProgress', parseInt(this.value)||0)">
      </div>
      <div class="kpi-sub">${hasSubtasks ? '서브태스크 완료율로 자동 계산됩니다.' : '서브태스크가 없어 수동 입력을 사용합니다.'}</div>
    </div>

    <div class="detail-field">
      <div class="detail-label">서브태스크 <span class="subtask-count">완료 ${doneCount}/전체 ${(t.subtasks||[]).length}</span></div>
      <div class="subtask-list">${subtaskItems || '<div style="font-size:11px;color:var(--g4)">아직 서브태스크가 없습니다.</div>'}</div>
      <div class="subtask-add">
        <input placeholder="+ 서브태스크 추가" onkeypress="if(event.key==='Enter'){addSubtask('${t.id}', this.value); this.value='';}">
        <button class="btn btn-sm" onclick="const i=this.previousElementSibling;addSubtask('${t.id}', i.value);i.value='';">추가</button>
      </div>
    </div>

    <div class="detail-field">
      <div class="detail-label">메모</div>
      <textarea class="detail-textarea" placeholder="메모·세부 지침·체크사항 등"
                onchange="updateTask('${t.id}', 'memo', this.value)">${escapeHtml(t.memo||'')}</textarea>
    </div>

    <button class="btn btn-danger" style="width:100%;justify-content:center" onclick="deleteTask('${t.id}')">작업 삭제</button>
  `;
  if (focusTaskNameOnRender) {
    focusTaskNameOnRender = false;
    setTimeout(() => {
      const input = document.getElementById('task-name-input');
      if (input) { input.focus(); input.select(); }
    }, 50);
  }
}

function updateTask(id, field, value) {
  const t = state.tasks.find(x => x.id===id);
  if (!t) return;
  t[field] = value;
  if (field === 'manualProgress') {
    t.manualProgress = Math.max(0, Math.min(100, Number(value || 0)));
    if (t.manualProgress >= 100) t.status = 'done';
    else if (t.manualProgress > 0 && t.status === 'todo') t.status = 'progress';
    else if (t.manualProgress === 0 && t.status === 'progress') t.status = 'todo';
  }
  saveState();
  renderAll();
}

function updatePeriod(taskId, periodId, field, value) {
  const t = state.tasks.find(x => x.id===taskId);
  const p = t && t.periods.find(x => x.id===periodId);
  if (!p) return;
  p[field] = value;
  if (daysBetween(p.start, p.end) < 0) {
    if (field === 'start') p.end = p.start;
    else p.start = p.end;
  }
  saveState();
  renderAll();
}

function addPeriod(taskId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  const lastEnd = (t.periods || []).map(p => p.end).sort().slice(-1)[0] || todayStr();
  const start = addDays(lastEnd, 1);
  t.periods.push({id:'p'+Date.now(), start, end:addDays(start, 2)});
  saveState();
  renderAll();
}

function removePeriod(taskId, periodId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  if ((t.periods || []).length <= 1) { alert('기간은 최소 1개가 필요합니다.'); return; }
  t.periods = t.periods.filter(p => p.id !== periodId);
  if (selectedPeriod && selectedPeriod.periodId === periodId) selectedPeriod = null;
  saveState();
  renderAll();
}

function toggleSubtask(taskId, subtaskId) {
  const t = state.tasks.find(x => x.id===taskId);
  const st = t && t.subtasks.find(x => x.id===subtaskId);
  if (!st) return;
  st.done = !st.done;
  const prog = taskProgress(t);
  if (prog >= 100) t.status = 'done';
  else if (prog > 0 && t.status === 'todo') t.status = 'progress';
  else if (prog === 0 && t.status === 'progress') t.status = 'todo';
  saveState();
  renderAll();
}

function updateSubtask(taskId, subtaskId, text) {
  const t = state.tasks.find(x => x.id===taskId);
  const st = t && t.subtasks.find(x => x.id===subtaskId);
  if (!st) return;
  st.text = text;
  saveState();
  renderAll();
}

function addSubtask(taskId, text) {
  if (!text || !text.trim()) return;
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  t.subtasks = t.subtasks || [];
  t.subtasks.push({id:'s'+Date.now(), text:text.trim(), done:false});
  saveState();
  renderAll();
}

function removeSubtask(taskId, subtaskId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  t.subtasks = (t.subtasks || []).filter(st => st.id !== subtaskId);
  saveState();
  renderAll();
}

function addTask() {
  const id = 't' + Date.now();
  const today = todayStr();
  state.tasks.push({
    id, phase:1, name:'새 작업',
    periods:[{id:'p'+Date.now(), start:today, end:addDays(today, 3)}],
    owners:[], status:'todo', memo:'', subtasks:[],
  });
  state.selectedTaskId = id;
  state.activeTab = 'task';
  focusTaskNameOnRender = true;
  saveState();
  renderAll();
}

function deleteTask(taskId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  if (!confirm(`'${t.name}' 작업을 삭제할까요?`)) return;
  state.tasks = state.tasks.filter(x => x.id !== taskId);
  delete state.expandedTasks[taskId];
  if (state.selectedTaskId === taskId) state.selectedTaskId = null;
  if (selectedPeriod && selectedPeriod.taskId === taskId) selectedPeriod = null;
  saveState();
  renderAll();
}

function toggleOwner(taskId, memberId) {
  const t = state.tasks.find(x => x.id===taskId);
  if (!t) return;
  t.owners = t.owners || [];
  const idx = t.owners.indexOf(memberId);
  if (idx >= 0) t.owners.splice(idx, 1);
  else t.owners.push(memberId);
  saveState();
  renderAll();
}

// ============ CHECKLIST ============
function renderChecklist() {
  const container = document.getElementById('checklist-container');
  let totalDone = 0, total = 0;
  Object.values(state.checklist).forEach(items => {
    total += items.length;
    totalDone += items.filter(i => i.done).length;
  });
  document.getElementById('tab-count-check').textContent = `${totalDone}/${total}`;

  container.innerHTML = Object.entries(state.checklist).map(([section, items]) => {
    const sectionDone = items.filter(i => i.done).length;
    return `<div class="check-section">
      <div class="check-section-title">
        <span>${section}</span>
        <span class="check-progress">${sectionDone}/${items.length}</span>
      </div>
      ${items.map(item => `
        <div class="check-item ${item.done?'checked':''}" onclick="toggleCheck('${section}', '${item.id}')">
          <div class="check-box"></div>
          <div class="check-text">${escapeHtml(item.text)}</div>
        </div>
      `).join('')}
      <div class="check-add">
        <input placeholder="새 항목 추가..." 
               onkeypress="if(event.key==='Enter'){addCheckItem('${section}', this.value); this.value='';}">
        <button class="btn btn-sm" onclick="const i=this.previousElementSibling;addCheckItem('${section}', i.value);i.value='';">추가</button>
      </div>
    </div>`;
  }).join('');
}

function toggleCheck(section, id) {
  const item = state.checklist[section].find(i => i.id===id);
  if (item) { item.done = !item.done; saveState(); renderAll(); }
}

function addCheckItem(section, text) {
  if (!text || !text.trim()) return;
  state.checklist[section].push({id: 'c'+Date.now(), text: text.trim(), done: false});
  saveState();
  renderAll();
}

// ============ IMPORT/EXPORT ============
function exportJSON() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `akj-schedule-${todayStr()}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!confirm('현재 데이터를 덮어쓰고 복원할까요?')) return;
        state = migrateState(data);
        saveState();
        renderAll();
        alert('복원 완료');
      } catch(err) { alert('파일을 읽을 수 없어요: ' + err.message); }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetAll() {
  if (!confirm('모든 데이터를 초기 상태로 되돌립니다.\n팀원·작업·체크리스트가 모두 초기화돼요. 진행할까요?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = loadState();
  renderAll();
}

// ============ ACCESS ============
function isAuthed() {
  return sessionStorage.getItem('akj-authenticated') === 'true';
}

function applyAccessState() {
  const authed = isAuthed();
  document.querySelector('.app').classList.toggle('locked', !authed);
  document.getElementById('pin-screen').classList.toggle('show', !authed);
  if (!authed) {
    setTimeout(() => document.getElementById('pin-input').focus(), 50);
  }
}

function verifyPin() {
  const input = document.getElementById('pin-input');
  const error = document.getElementById('pin-error');
  if (input.value === ACCESS_PIN) {
    sessionStorage.setItem('akj-authenticated', 'true');
    error.textContent = '';
    input.value = '';
    applyAccessState();
    renderAll();
  } else {
    error.textContent = 'PIN이 올바르지 않습니다';
    input.select();
  }
}

function lockDashboard() {
  sessionStorage.removeItem('akj-authenticated');
  applyAccessState();
}

function renderEventBanner() {
  const banner = document.getElementById('event-banner');
  const today = todayStr();
  const events = MILESTONES.filter(m => m.date === today);
  if (!events.length) {
    banner.classList.remove('show');
    banner.innerHTML = '';
    return;
  }
  banner.innerHTML = events.map(m => `📅 오늘 — ${escapeHtml(m.label)} · ${m.date}${m.time ? ' ' + escapeHtml(m.time) : ''}`).join(' · ');
  banner.classList.add('show');
}

// ============ MAIN ============
function renderAll() {
  if (!isAuthed()) {
    applyAccessState();
    return;
  }
  applyAccessState();
  renderEventBanner();
  renderKPI();
  renderGantt();
  renderTaskList();
  renderMembers();
  renderTaskDetail();
  renderChecklist();
  switchTab(state.activeTab);
}

applyAccessState();
if (isAuthed()) renderAll();
</script>
</body>
</html>
